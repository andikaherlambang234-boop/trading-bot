const sigShort = (sig) => {

};

function isMarketOpen() {

function getRoundLvls(price) {

// ==========================================
// 3. CORE TRADING LOGIC (The Brain)
// ==========================================
function calcScalpScoreV4() {
    const m5 = APST.tfData.M15?.normalized || 50;
    const m15 = APST.tfData.H1?.normalized || 50;
    const avg = (m5 + m15) / 2;
    let dir = 'NEUTRAL', strength = 'Low';
    if (avg > 60) { dir = 'BULL'; strength = avg > 75 ? 'Strong' : 'Moderate'; }
    else if (avg < 40) { dir = 'BEAR'; strength = avg < 25 ? 'Strong' : 'Moderate'; }
    return { scalp: avg, dir, strength, m5Score: Math.round(m5), m15Score: Math.round(m15), squeeze: APST.tfData.H1?.squeeze?.sqzOn };
}

function calcSniperScore() {
    const h1 = APST.tfData.H1;
    if (!h1) return null;
    let score = 50;
    let factors = [];
    let isBull = h1.supertrend?.bullish || false;

    // 1. Supertrend (25pts)
    const stPts = h1.supertrend ? 25 : 0;
    factors.push({ name: 'Supertrend', pts: stPts, max: 25, status: h1.supertrend?.bullish ? 'BULL' : 'BEAR', cls: h1.supertrend?.bullish ? 'b-buy' : 'b-sell' });
    score += isBull ? stPts : -stPts;

    // 2. TTM Squeeze (25pts)
    const sqzPts = h1.squeeze?.sqzOn ? 10 : (h1.squeeze?.bullishMomentum ? 25 : 0);
    factors.push({ name: 'TTM Squeeze', pts: sqzPts, max: 25, status: h1.squeeze?.sqzOn ? 'COILING' : 'FIRED', cls: 'b-warn' });
    score += sqzPts;

    // 3. Market Structure (30pts)
    const msPts = h1.marketStructure?.msb ? 30 : 15;
    factors.push({ name: 'Structure', pts: msPts, max: 30, status: h1.marketStructure?.trend.toUpperCase(), cls: 'b-neu' });
    score += msPts;

    // 4. OBV (20pts)
    const obvPts = h1.obv?.bullish ? 20 : 0;
    factors.push({ name: 'OBV Volume', pts: obvPts, max: 20, status: h1.obv?.bullish ? 'ACCUM' : 'DIST', cls: 'b-neu' });
    score += obvPts;

    const finalPct = Math.min(100, Math.max(0, score));
    return {
        pct: finalPct,
        quality: finalPct > 85 ? 'SNIPER' : finalPct > 72 ? 'GOOD' : finalPct > 50 ? 'AVERAGE' : 'POOR',
        qualCls: finalPct > 85 ? 'b-sniper' : finalPct > 72 ? 'b-buy' : 'b-neu',
        shouldEnter: finalPct >= 72,
        isBull: isBull,
        factors: factors
    };
}

function calcOrderLevels() {
    const price = APST.price;
    const atr = APST.tfData.H1?.atr || 5.0;
    const nearRes = APST.pivots.r1 || price + 10;
    const nearSup = APST.pivots.s1 || price - 10;

    const buildLvl = (entry, sl, tpMult) => ({
        entry, sl,
        tp1: entry + (entry - sl) * 1.5,
        tp2: entry + (entry - sl) * 2.5,
        tp3: entry + (entry - sl) * 4.0,
        conf: Math.round(Math.random() * 40) + 60,
        active: false
    });

    const buy = buildLvl(price, price - (atr * 1.2));
    const sell = buildLvl(price, price + (atr * 1.2));
    
    let priority = 'wait';
    if (APST.composite > 70) { priority = 'buy'; buy.active = true; }
    else if (APST.composite < 30) { priority = 'sell'; sell.active = true; }

    return { priority, buy, sell, buyStop: buildLvl(nearRes, nearRes - (atr*1.2)), sellStop: buildLvl(nearSup, nearSup + (atr*1.2)), atr, nearRes, nearSup };
}

async function runAISummary() {
    const key = getApiKey();
    if (!key) return;
    try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
            body: JSON.stringify({
                model: 'claude-3-5-sonnet-20240620',
                max_tokens: 200,
                messages: [{ role: 'user', content: buildGoldContext() + '\n\nRingkasan 2 kalimat Bahasa Indonesia: sinyal dan level kunci.' }]
            })
        });
        const d = await res.json();
        const txt = d.content?.[0]?.text || '';
        if ($('ai-summary')) {
            $('ai-summary').style.display = 'block';
            $('ai-summary').innerHTML = `<span style="color:var(--gold);font-size:6.5px;display:block">🤖 AI SUMMARY</span>` + esc(txt);
        }
    } catch (e) { console.error(e); }
}

function openChat() {
    $('chat-panel').classList.add('on');
    $('chat-messages').innerHTML = '';
    appendMsg('ai', 'V4 Apex siap. Apa yang ingin Anda analisis hari ini?');
}

function closeChat() { $('chat-panel').classList.remove('on'); }

function appendMsg(role, html) {
    const d = document.createElement('div');
    d.className = role === 'user' ? 'chat-msg chat-user' : 'chat-msg chat-ai';
    d.innerHTML = role === 'ai' ? `<span class="ai-lbl-sm">CLAUDE AI V4</span>` + html : html;
    $('chat-messages').appendChild(d);
    $('chat-messages').scrollTop = $('chat-messages').scrollHeight;
}

async function sendChat() {
    const inp = $('chat-inp');
    const msg = inp?.value.trim();
    if (!msg) return;
    const key = getApiKey();
    if (!key) { appendMsg('ai', 'Kunci API belum diset.'); return; }
    
    inp.value = '';
    appendMsg('user', msg);
    showTyping();

    try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
            body: JSON.stringify({
                model: 'claude-3-5-sonnet-20240620',
                max_tokens: 800,
                system: 'Kamu adalah GOLD SENTINEL AI V4, analis XAU/USD. Jawab ringkas dalam Bahasa Indonesia.',
                messages: [{ role: 'user', content: buildGoldContext() + '\n\nPertanyaan: ' + msg }]
            })
        });
        const d = await res.json();
        hideTyping();
        appendMsg('ai', d.content?.[0]?.text.replace(/\n/g, '<br>') || 'Maaf, terjadi error.');
    } catch (e) {
        hideTyping();
        appendMsg('ai', 'Error: ' + e.message);
    }
}

function showTyping() {
    const d = document.createElement('div');
    d.id = 'chat-typing';
    d.className = 'chat-typing';
    d.innerHTML = '<span></span><span></span><span></span>';
    $('chat-messages').appendChild(d);
}

function hideTyping() { $('chat-typing')?.remove(); }

function openTradePlan() {
    $('tp-panel').classList.add('on');
    generateTradePlan();
}

function closeTradePlan() { $('tp-panel').classList.remove('on'); }

async function generateTradePlan() {
    const key = getApiKey();
    if (!key) return;
    $('tp-loading').style.display = 'block';
    $('tp-content').innerHTML = '';

    try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
            body: JSON.stringify({
                model: 'claude-3-5-sonnet-20240620',
                max_tokens: 1000,
                messages: [{ role: 'user', content: buildGoldContext() + '\n\nBuat Trade Plan Sniper-Grade XAU/USD Bahasa Indonesia.' }]
            })
        });
        const d = await res.json();
        $('tp-loading').style.display = 'none';
        $('tp-content').innerHTML = esc(d.content?.[0]?.text).replace(/\n/g, '<br>');
        $('tp-actions').classList.remove('hidden');
    } catch (e) {
        $('tp-loading').style.display = 'none';
        $('tp-content').innerHTML = 'Error: ' + e.message;
    }
}

// ==========================================
// 7. UTILITIES & SYSTEM
// ==========================================
function openTools() { $('tools-overlay').classList.add('on'); }
function closeTools() { $('tools-overlay').classList.remove('on'); }
function openPanel(id, cb) { 
    $(id).classList.add('on'); 
    if (cb) cb(); 
}
function closePanel(id) { $(id).classList.remove('on'); }

function saveCfg() {
    cfg.apiKey = $('inp-apikey').value.trim();
    cfg.tgToken = $('inp-tgtoken').value.trim();
    cfg.tgChat = $('inp-tgchat').value.trim();
    cfg.tgSig = $('inp-tgsig').checked;
    cfg.tgSb = $('inp-tgsb').checked;
    cfg.alertAbove = parseFloat($('inp-alert-above').value) || 0;
    cfg.alertBelow = parseFloat($('inp-alert-below').value) || 0;
    lsSet('gs4_cfg', cfg);
    closePanel('settings-panel');
}

function loadCfgUI() {
    $('inp-apikey').value = cfg.apiKey;
    $('inp-tgtoken').value = cfg.tgToken;
    $('inp-tgchat').value = cfg.tgChat;
}

function notifyChange() {
    if (APST.signal === prevNotifSignal) return;
    showToast('Signal berubah: ' + APST.signal, 'bull');
    prevNotifSignal = APST.signal;
}

function showToast(msg, type) {
    const t = document.createElement('div');
    t.className = `toast-item toast-${type}`;
    t.textContent = msg;
    $('sig-toast').appendChild(t);
    setTimeout(() => t.remove(), 3500);
}

function checkAlerts() {
    if (cfg.alertAbove > 0 && APST.price > cfg.alertAbove) showToast('Price Above Alert!', 'bull');
    if (cfg.alertBelow > 0 && APST.price < cfg.alertBelow) showToast('Price Below Alert!', 'bear');
}

function logSignal() {
    const id = 'gs_' + Date.now();
    winHistory[id] = { ...APST, at: Date.now() };
    lsSet('gs4_win', winHistory);
    showToast('Sinyal dicatat!', 'bull');
}

function renderWin() {
    const items = Object.values(winHistory).sort((a,b) => b.at - a.at);
    $('win-list').innerHTML = items.map(w => `<div class="gp mb-2"><b>${w.signal}</b> @ ${fPrice(w.price)}</div>`).join('');
}

// ==========================================
// 8. INITIALIZATION
// ==========================================
setInterval(() => {
    timeLeft = Math.max(0, timeLeft - 1);
    const tb = $('timerBar');
    if (tb) tb.style.width = (timeLeft / currentRefresh * 100) + '%';
    if ($('clock')) $('clock').textContent = new Date().toLocaleTimeString('id-ID');
    if (timeLeft <= 0) {
        timeLeft = currentRefresh;
        fetchAllData();
    }
}, 1000);

// Start App
window.onload = () => {
    cfg = lsGet('gs4_cfg');
    winHistory = lsGet('gs4_win');
    loadCfgUI();
    fetchAllData();
    updateWrDisplay();
};

function updateWrDisplay() {
    const items = Object.values(winHistory);
    if ($('wr-disp')) {
        $('wr-disp').classList.toggle('hidden', items.length === 0);
        $('wr-disp').textContent = 'HIST ' + items.length;
    }
}

// Expose functions to global scope for HTML onclick
window.manualRefresh = fetchAllData;
window.openChat = openChat;
window.closeChat = closeChat;
window.sendChat = sendChat;
window.openTradePlan = openTradePlan;
window.closeTradePlan = closeTradePlan;
window.openTools = openTools;
window.closeTools = closeTools;
window.openPanel = openPanel;
window.closePanel = closePanel;
window.saveCfg = saveCfg;
window.loadCfgUI = loadCfgUI;
window.logSignal = logSignal;
window.renderWin = renderWin;
window.clearWin = () => { winHistory = {}; lsSet('gs4_win', {}); renderWin(); };
window.sendQ = (q) => { $('chat-inp').value = q; sendChat(); };
</script>
